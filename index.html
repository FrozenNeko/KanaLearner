<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kana Learner</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #242424;
            --text-main: #e0e0e0;
            --text-muted: #888;
            --accent: #bb86fc;
            --accent-hover: #9965f4;
            --correct: #4caf50;
            --wrong: #cf6679;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            transition: background-color 0.3s;
        }

        .menu-container, .app-container { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 15px; }
        .hidden { display: none !important; }

        .btn {
            background-color: var(--accent);
            color: #000;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn:hover { background-color: var(--accent-hover); }
        .btn:disabled { background-color: #555; cursor: not-allowed; }
        .btn-secondary { background-color: var(--card-bg); color: var(--accent); border: 2px solid var(--accent); }

        .controls { display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px; }
        .controls select {
            padding: 12px;
            background: var(--card-bg);
            color: var(--text-main);
            border: 1px solid #444;
            border-radius: 8px;
        }

        /* Flashcard */
        .card-container { perspective: 1000px; height: 300px; width: 100%; margin-bottom: 20px; }
        .card { width: 100%; height: 100%; position: relative; transition: transform 0.4s; transform-style: preserve-3d; }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background-color: var(--card-bg); border-radius: 12px; border: 1px solid #333;
        }
        .card-back { transform: rotateY(180deg); }
        .kana-char { font-size: 100px; margin: 0; }
        .romaji-text { font-size: 40px; color: var(--accent); margin: 0; }

        /* Quiz Choice Grid */
        .choices-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; margin-top: 20px; }
        .quiz-input { width: 100%; padding: 15px; font-size: 24px; text-align: center; background: #000; color: white; border: 2px solid #555; border-radius: 8px; }

        .stats { display: flex; justify-content: space-between; font-size: 18px; margin-bottom: 10px; }
        #confetti-canvas { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 100; }

        #motivational-video-link {
            color: white;
            align-self: flex-start;
            margin-bottom: -2rem;
        }
    </style>
    <link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
</head>
<body>

    <canvas id="confetti-canvas"></canvas>
    <a href="https://www.youtube.com/watch?v=OO14VSx74MU" id="motivational-video-link">Motivational Video (Youtube)</a>
    <h1 style="color: var(--accent)">Kana Learner Pro</h1>

    <div id="main-menu" class="menu-container">
        <div class="controls">
            <label>Select Script Set:</label>
            <select id="script-select">
                <option value="h-basic">Hiragana (Basic)</option>
                <option value="h-all">Hiragana (Full w/ Dakuon)</option>
                <option value="k-basic">Katakana (Basic)</option>
                <option value="k-all">Katakana (Full w/ Dakuon)</option>
                <option value="both">Mixed All</option>
            </select>
            
            <label>Quiz Difficulty:</label>
            <select id="difficulty-select">
                <option value="easy">Easy (Multiple Choice)</option>
                <option value="hard" selected>Hard (Type Romaji)</option>
            </select>
        </div>

        <button class="btn" onclick="startApp('learn')">📖 Learn Mode</button>
        <button class="btn" onclick="startApp('quiz')">✍️ Quiz Mode</button>
        <button class="btn btn-secondary" id="btn-mistakes" onclick="startApp('mistakes')">⚠️ Review Mistakes (<span id="mistake-count">0</span>)</button>
    </div>

    <div id="app-ui" class="app-container hidden">
        <div class="stats" id="quiz-stats">
            <span style="color: var(--correct)">Correct: <span id="score-correct">0</span></span>
            <span style="color: var(--wrong)">Wrong: <span id="score-wrong">0</span></span>
        </div>

        <!-- Learn View -->
        <div id="learn-view" class="hidden">
            <div class="card-container" onclick="flipCard()">
                <div class="card" id="flashcard">
                    <div class="card-face">
                        <p class="kana-char" id="learn-char">あ</p>
                    </div>
                    <div class="card-face card-back">
                        <p class="romaji-text" id="learn-romaji">a</p>
                    </div>
                </div>
            </div>
            <button class="btn" style="width: 100%;" onclick="nextItem()">Next Card ➔</button>
        </div>

        <!-- Quiz View -->
        <div id="quiz-view" class="hidden">
            <div style="background: var(--card-bg); padding: 30px; border-radius: 12px; text-align: center;">
                <p class="kana-char" id="quiz-char">あ</p>
                
                <div id="input-area-hard">
                    <input type="text" id="quiz-input" class="quiz-input" placeholder="Type romaji..." autocomplete="off">
                </div>

                <div id="input-area-easy" class="choices-grid hidden">
                    <!-- Buttons generated by JS -->
                </div>

                <div id="feedback" class="hidden" style="margin-top: 20px;">
                    <p id="feedback-msg" style="color: var(--wrong); font-weight: bold;"></p>
                    <button class="btn btn-secondary" onclick="nextItem()">Got it ➔</button>
                </div>
            </div>
        </div>

        <button class="btn btn-secondary" style="margin-top: 10px;" onclick="returnToMenu()">🏠 Menu</button>
    </div>

    <script>
        const hiraganaBasic = [
            {k:'あ', r:'a'}, {k:'い', r:'i'}, {k:'う', r:'u'}, {k:'え', r:'e'}, {k:'お', r:'o'},
            {k:'か', r:'ka'}, {k:'き', r:'ki'}, {k:'く', r:'ku'}, {k:'け', r:'ke'}, {k:'こ', r:'ko'},
            {k:'さ', r:'sa'}, {k:'し', r:'shi'}, {k:'す', r:'su'}, {k:'せ', r:'se'}, {k:'そ', r:'so'},
            {k:'た', r:'ta'}, {k:'ち', r:'chi'}, {k:'つ', r:'tsu'}, {k:'て', r:'te'}, {k:'と', r:'to'},
            {k:'な', r:'na'}, {k:'に', r:'ni'}, {k:'ぬ', r:'nu'}, {k:'ね', r:'ne'}, {k:'の', r:'no'},
            {k:'は', r:'ha'}, {k:'ひ', r:'hi'}, {k:'ふ', r:'fu'}, {k:'へ', r:'he'}, {k:'ほ', r:'ho'},
            {k:'ま', r:'ma'}, {k:'み', r:'mi'}, {k:'む', r:'mu'}, {k:'め', r:'me'}, {k:'も', r:'mo'},
            {k:'や', r:'ya'}, {k:'ゆ', r:'yu'}, {k:'よ', r:'yo'},
            {k:'ら', r:'ra'}, {k:'り', r:'ri'}, {k:'る', r:'ru'}, {k:'れ', r:'re'}, {k:'ろ', r:'ro'},
            {k:'わ', r:'wa'}, {k:'を', r:'wo'}, {k:'ん', r:'n'}
        ];

        const hiraganaDakuon = [
            {k:'が', r:'ga'}, {k:'ぎ', r:'gi'}, {k:'ぐ', r:'gu'}, {k:'げ', r:'ge'}, {k:'ご', r:'go'},
            {k:'ざ', r:'za'}, {k:'じ', r:'ji'}, {k:'ず', r:'zu'}, {k:'ぜ', r:'ze'}, {k:'ぞ', r:'zo'},
            {k:'だ', r:'da'}, {k:'ぢ', r:'ji'}, {k:'づ', r:'zu'}, {k:'で', r:'de'}, {k:'ど', r:'do'},
            {k:'ば', r:'ba'}, {k:'び', r:'bi'}, {k:'ぶ', r:'bu'}, {k:'べ', r:'be'}, {k:'ぼ', r:'bo'},
            {k:'ぱ', r:'pa'}, {k:'ぴ', r:'pi'}, {k:'ぷ', r:'pu'}, {k:'ぺ', r:'pe'}, {k:'ぽ', r:'po'}
        ];

        const katakanaBasic = [
            {k:'ア', r:'a'}, {k:'イ', r:'i'}, {k:'ウ', r:'u'}, {k:'エ', r:'e'}, {k:'オ', r:'o'},
            {k:'カ', r:'ka'}, {k:'キ', r:'ki'}, {k:'ク', r:'ku'}, {k:'ケ', r:'ke'}, {k:'コ', r:'ko'},
            {k:'サ', r:'sa'}, {k:'シ', r:'shi'}, {k:'ス', r:'su'}, {k:'セ', r:'se'}, {k:'ソ', r:'so'},
            {k:'タ', r:'ta'}, {k:'チ', r:'chi'}, {k:'ツ', r:'tsu'}, {k:'テ', r:'te'}, {k:'ト', r:'to'},
            {k:'ナ', r:'na'}, {k:'ニ', r:'ni'}, {k:'ヌ', r:'nu'}, {k:'ネ', r:'ne'}, {k:'ノ', r:'no'},
            {k:'ハ', r:'ha'}, {k:'ヒ', r:'hi'}, {k:'フ', r:'fu'}, {k:'ヘ', r:'he'}, {k:'ホ', r:'ho'},
            {k:'マ', r:'ma'}, {k:'ミ', r:'mi'}, {k:'ム', r:'mu'}, {k:'メ', r:'me'}, {k:'モ', r:'mo'},
            {k:'ヤ', r:'ya'}, {k:'ユ', r:'yu'}, {k:'ヨ', r:'yo'},
            {k:'ラ', r:'ra'}, {k:'リ', r:'ri'}, {k:'ル', r:'ru'}, {k:'レ', r:'re'}, {k:'ロ', r:'ro'},
            {k:'ワ', r:'wa'}, {k:'ヲ', r:'wo'}, {k:'ン', r:'n'}
        ];

        const katakanaDakuon = [
            {k:'ガ', r:'ga'}, {k:'ギ', r:'gi'}, {k:'グ', r:'gu'}, {k:'ゲ', r:'ge'}, {k:'ゴ', r:'go'},
            {k:'ザ', r:'za'}, {k:'ジ', r:'ji'}, {k:'ズ', r:'zu'}, {k:'ゼ', r:'ze'}, {k:'ゾ', r:'zo'},
            {k:'ダ', r:'da'}, {k:'ヂ', r:'ji'}, {k:'ヅ', r:'zu'}, {k:'デ', r:'de'}, {k:'ド', r:'do'},
            {k:'バ', r:'ba'}, {k:'ビ', r:'bi'}, {k:'ブ', r:'bu'}, {k:'ベ', r:'be'}, {k:'ボ', r:'bo'},
            {k:'パ', r:'pa'}, {k:'ピ', r:'pi'}, {k:'プ', r:'pu'}, {k:'ペ', r:'pe'}, {k:'ポ', r:'po'}
        ];

        let activeList = [];
        let fullPool = []; // For generating random distractors
        let currentItem = null;
        let mode = 'learn';
        let difficulty = 'hard';
        let stats = { correct: 0, wrong: 0 };

        document.getElementById('quiz-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkAnswer(e.target.value);
        });

        function updateMistakeCount() {
            const count = (JSON.parse(localStorage.getItem('kanaMistakes')) || []).length;
            document.getElementById('mistake-count').innerText = count;
            document.getElementById('btn-mistakes').disabled = count === 0;
        }
        updateMistakeCount();

        function startApp(selectedMode) {
            mode = selectedMode;
            difficulty = document.getElementById('difficulty-select').value;
            const scriptType = document.getElementById('script-select').value;
            
            // Build the pool
            let pool = [];
            if (scriptType.includes('h-basic')) pool = [...hiraganaBasic];
            else if (scriptType.includes('h-all')) pool = [...hiraganaBasic, ...hiraganaDakuon];
            else if (scriptType.includes('k-basic')) pool = [...katakanaBasic];
            else if (scriptType.includes('k-all')) pool = [...katakanaBasic, ...katakanaDakuon];
            else pool = [...hiraganaBasic, ...hiraganaDakuon, ...katakanaBasic, ...katakanaDakuon];

            fullPool = pool;
            activeList = (mode === 'mistakes') ? JSON.parse(localStorage.getItem('kanaMistakes')) : [...pool];
            activeList = activeList.sort(() => Math.random() - 0.5);

            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('app-ui').classList.remove('hidden');
            document.getElementById('learn-view').classList.toggle('hidden', mode !== 'learn');
            document.getElementById('quiz-view').classList.toggle('hidden', mode === 'learn');
            
            stats = { correct: 0, wrong: 0 };
            updateStatsUI();
            nextItem();
        }

        async function nextItem() {
            if (activeList.length === 0) {
                alert("Set complete!");
                return returnToMenu();
            }

            // FIX: Prevent spoiler by resetting flip before content change
            const card = document.getElementById('flashcard');
            if (card.classList.contains('is-flipped')) {
                card.classList.remove('is-flipped');
                await new Promise(r => setTimeout(r, 250)); // Wait for flip back animation
            }

            currentItem = activeList.pop();
            
            if (mode === 'learn') {
                document.getElementById('learn-char').innerText = currentItem.k;
                document.getElementById('learn-romaji').innerText = currentItem.r;
            } else {
                setupQuizRound();
            }
        }

        function setupQuizRound() {
            document.getElementById('quiz-char').innerText = currentItem.k;
            document.getElementById('feedback').classList.add('hidden');
            const hardArea = document.getElementById('input-area-hard');
            const easyArea = document.getElementById('input-area-easy');

            if (difficulty === 'hard') {
                hardArea.classList.remove('hidden');
                easyArea.classList.add('hidden');
                const input = document.getElementById('quiz-input');
                input.value = '';
                input.disabled = false;
                input.focus();
            } else {
                hardArea.classList.add('hidden');
                easyArea.classList.remove('hidden');
                generateChoices();
            }
        }

        function generateChoices() {
            const container = document.getElementById('input-area-easy');
            container.innerHTML = '';
            
            // Get 3 random wrong answers
            let choices = [currentItem.r];
            let filteredPool = fullPool.filter(x => x.r !== currentItem.r);
            while (choices.length < 4 && filteredPool.length > 0) {
                let rand = filteredPool[Math.floor(Math.random() * filteredPool.length)].r;
                if (!choices.includes(rand)) choices.push(rand);
            }
            
            choices.sort(() => Math.random() - 0.5).forEach(choice => {
                const btn = document.createElement('button');
                btn.className = 'btn btn-secondary';
                btn.innerText = choice;
                btn.onclick = () => checkAnswer(choice);
                container.appendChild(btn);
            });
        }

        function checkAnswer(answer) {
            const finalAns = answer.trim().toLowerCase();
            if (!finalAns) return;

            if (finalAns === currentItem.r) {
                stats.correct++;
                triggerCorrect();
                removeFromMistakes(currentItem);
                setTimeout(nextItem, 600);
            } else {
                stats.wrong++;
                saveMistake(currentItem);
                showFeedback();
            }
            updateStatsUI();
        }

        function showFeedback() {
            const f = document.getElementById('feedback');
            f.classList.remove('hidden');
            document.getElementById('feedback-msg').innerText = `Wrong! It's "${currentItem.r}"`;
            if (difficulty === 'hard') document.getElementById('quiz-input').disabled = true;
            else {
                document.querySelectorAll('#input-area-easy button').forEach(b => b.disabled = true);
            }
        }

        function flipCard() { document.getElementById('flashcard').classList.toggle('is-flipped'); }

        function returnToMenu() {
            document.getElementById('app-ui').classList.add('hidden');
            document.getElementById('main-menu').classList.remove('hidden');
            updateMistakeCount();
        }

        function updateStatsUI() {
            document.getElementById('score-correct').innerText = stats.correct;
            document.getElementById('score-wrong').innerText = stats.wrong;
        }

        function saveMistake(item) {
            let m = JSON.parse(localStorage.getItem('kanaMistakes')) || [];
            if (!m.find(x => x.k === item.k)) {
                m.push(item);
                localStorage.setItem('kanaMistakes', JSON.stringify(m));
            }
        }

        function removeFromMistakes(item) {
            let m = JSON.parse(localStorage.getItem('kanaMistakes')) || [];
            const filtered = m.filter(x => x.k !== item.k);
            if (filtered.length !== m.length) {
                localStorage.setItem('kanaMistakes', JSON.stringify(filtered));
            }
        }

        function triggerCorrect() {
            document.body.style.backgroundColor = '#1b3320';
            setTimeout(() => document.body.style.backgroundColor = 'var(--bg-color)', 300);
            fireConfetti();
        }

        // --- Minimal Confetti ---
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize; resize();

        function fireConfetti() {
            for(let i=0; i<30; i++) particles.push({
                x: canvas.width/2, y: canvas.height/2,
                dx: (Math.random()-0.5)*10, dy: (Math.random()-0.5)*10,
                c: `hsl(${Math.random()*360}, 70%, 50%)`, r: Math.random()*4+2
            });
            if(particles.length < 40) draw();
        }

        function draw() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            particles.forEach((p,i) => {
                p.x += p.dx; p.y += p.dy; p.dy += 0.2;
                ctx.fillStyle = p.c;
                ctx.fillRect(p.x, p.y, p.r, p.r);
                if(p.y > canvas.height) particles.splice(i,1);
            });
            if(particles.length > 0) requestAnimationFrame(draw);
        }
    </script>
</body>
</html>
